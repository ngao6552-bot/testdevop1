version: '3.8'

services:
  backend:
    build:
      context: ./Backend
      dockerfile: ../Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - devops-network

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:5000
    restart: unless-stopped
    networks:
      - devops-network

networks:
  devops-network:
    driver: bridge
